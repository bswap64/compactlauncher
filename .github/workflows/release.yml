name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-7zip
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-qt6-translations

      - name: Configure
        run: cmake -S src -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Deploy
        run: |
          cd build
          windeployqt6 CompactLauncher.exe
          ldd CompactLauncher.exe updater.exe \
            | grep -i mingw \
            | awk '{print $3}' \
            | sort -u \
            | xargs -I{} cp {} .

      - name: Zip
        run: |
          cd build
          7z a "../CompactLauncher-windows-x64.zip" \
            CompactLauncher.exe \
            updater.exe \
            *.dll \
            generic/ \
            imageformats/ \
            networkinformation/ \
            platforms/ \
            styles/ \
            tls/ \
            translations/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: CompactLauncher-windows-x64.zip

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            qt6-base-dev \
            libgl1-mesa-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            zlib1g-dev \
            zip

      - name: Configure
        run: cmake -S src -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Zip
        run: |
          cd build
          zip ../CompactLauncher-linux-x64.zip CompactLauncher updater

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: CompactLauncher-linux-x64.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV" ]; then
            COMMITS=$(git log "$PREV..HEAD" --pretty=format:"%H|%s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"%H|%s" --no-merges)
          fi

          BODY="**CompactLauncher $TAG**"$'\n'
          while IFS='|' read -r hash msg; do
            [ -z "$hash" ] && continue
            URL="https://github.com/$REPO/commit/$hash"
            BODY+="- $msg :: $URL"$'\n'
          done <<< "$COMMITS"

          {
            echo "body<<EOF_NOTES"
            echo "$BODY"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: actions/github-script@v7
        with:
          script: |
            const tag  = context.ref.replace('refs/tags/', '');
            const body = `${{ steps.notes.outputs.body }}`;
            const fs   = require('fs');

            const release = await github.rest.repos.createRelease({
              ...context.repo,
              tag_name: tag,
              name: `CompactLauncher ${tag}`,
              body: body,
            });

            for (const zip of ['CompactLauncher-windows-x64.zip', 'CompactLauncher-linux-x64.zip']) {
              await github.rest.repos.uploadReleaseAsset({
                ...context.repo,
                release_id: release.data.id,
                name: zip,
                data: fs.readFileSync(zip),
              });
            }
